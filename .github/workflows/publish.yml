name: Upload Python Package to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  release-build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build --outdir dist/

      - name: Extract version
        id: get-version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -n "$TAG" ]; then
            VERSION="${TAG#v}"
          else
            VERSION=$(grep -m1 '^version' pyproject.toml | cut -d'"' -f2 || echo "0.0.0")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/
          retention-days: 1

  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release-build
    environment:
      name: pypi
      url: https://pypi.org/project/prism-engine-tools/${{ needs.release-build.outputs.version }}

    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true

      - name: Print success message
        run: |
          echo "✅ Published ${{ needs.release-build.outputs.version }} to PyPI"
          echo "🔗 https://pypi.org/project/prism-engine-tools/${{ needs.release-build.outputs.version }}/"